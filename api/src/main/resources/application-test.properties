# ============================================================
# PERFIL DE TESTS - usado por @ActiveProfiles("test")
# ============================================================

# Base de datos H2 en memoria (aislada del dev)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# hibernate crea y destruye el schema en cada test — flyway no aplica aqui
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.h2.console.enabled=false

# JWT para tests
jwt.secret=testSecretKeyForTestingPurposesOnly!!MinLength32
jwt.expiration=86400000

# Usuarios iniciales para tests (deben coincidir con los usados en E2E)
app.admin.username=admin
app.admin.password=admin123
app.user.username=user
app.user.password=user123

# Rate limiting permisivo para tests
rate.limit.max-requests=1000
rate.limit.window-ms=60000
