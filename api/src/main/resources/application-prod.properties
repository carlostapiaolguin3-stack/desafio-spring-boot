# ============================================================
# PERFIL DE PRODUCCION
# Todas las configuraciones sensibles via variables de entorno
# Activar con: -Dspring.profiles.active=prod
# ============================================================

# Base de datos (configurar segun el motor de prod: PostgreSQL, MySQL, etc.)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false

# JWT - OBLIGATORIO: definir JWT_SECRET en las variables de entorno del servidor
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Usuarios iniciales de produccion
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD}
app.user.username=${USER_USERNAME:user}
app.user.password=${USER_PASSWORD}

# Rate limiting
rate.limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:5}
rate.limit.window-ms=${RATE_LIMIT_WINDOW_MS:60000}
