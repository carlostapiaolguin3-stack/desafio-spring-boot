# ============================================================
# PERFIL DE DESARROLLO
# En produccion usar variables de entorno (ver application-prod.properties)
# ============================================================

# Base de datos H2 en memoria
# el H2ServerConfig levanta un servidor tcp adicional en el puerto 9092
# para que el visor externo (docker) pueda conectarse
spring.datasource.url=jdbc:h2:mem:desafiodb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# flyway — ejecuta las migraciones en db/migration al arrancar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT - solo para desarrollo, en produccion usar: export JWT_SECRET=<valor_seguro>
jwt.secret=desafioDevSecretKeyForDevelopmentOnly!ChangeInProd
jwt.expiration=86400000

# Usuarios iniciales de desarrollo
app.admin.username=admin
app.admin.password=admin123
app.user.username=user
app.user.password=user123

# Rate limiting
rate.limit.max-requests=5
rate.limit.window-ms=60000
